name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# OIDC trusted publishing: id-token:write authorizes the publish via the npm
# registry verifying the GitHub OIDC token. contents:write is for the
# auto-create-GitHub-Release step.
permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: npm
      url: https://www.npmjs.com/package/@yoda.digital/mycelium
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Mycelium is a Bun-runtime package, but we still publish via npm,
      # which requires a Node toolchain in CI. Install both.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Node 24 ships with npm 11+ natively. OIDC trusted publishing requires
      # npm >= 11.5.1. We deliberately use 24 here (not the .nvmrc-pinned
      # value) because the toolcache npm 10.x cannot self-upgrade reliably.
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm >=11.5.1
        run: |
          set -euo pipefail
          ver=$(npm --version)
          echo "npm: $ver"
          if [ "$(printf '%s\n' '11.5.1' "$ver" | sort -V | head -1)" != "11.5.1" ]; then
            echo "::error::npm $ver < 11.5.1 — OIDC publish needs >= 11.5.1"
            exit 1
          fi

      - name: Install deps (bun, frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' (=$TAG) does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Tag and package.json version both = $PKG"

      - name: Typecheck (blocking — strict passes since 0.2.0)
        run: bunx tsc --noEmit

      - name: Build (bun → build/)
        run: bun run build

      - name: Verify build artifacts
        run: |
          set -euo pipefail
          test -x build/relay.js || (echo "::error::build/relay.js missing or not executable" && exit 1)
          test -x build/peer-channel.js || (echo "::error::build/peer-channel.js missing or not executable" && exit 1)
          head -1 build/relay.js | grep -q '^#!/usr/bin/env bun' || (echo "::error::build/relay.js missing bun shebang" && exit 1)
          head -1 build/peer-channel.js | grep -q '^#!/usr/bin/env bun' || (echo "::error::build/peer-channel.js missing bun shebang" && exit 1)
          echo "build artifacts OK"

      - name: Tests
        run: bun run test

      # Idempotency guard: makes workflow_dispatch re-runs safe.
      - name: Skip publish if version already on npm
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${NAME}@${VERSION} already on npm — skipping publish step."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      # No --provenance flag, no NODE_AUTH_TOKEN — OIDC handles both.
      - name: Publish to npm via OIDC
        if: steps.check.outputs.already_published == 'false'
        run: npm publish --access public

      - name: Create GitHub Release (if missing)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — leaving it alone."
          else
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${{ github.repository }}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --latest
          fi
